name: Bug Report
description: Report a problem with the example plugin template
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Clone the template
        2. Run `uv sync --extra dev`
        3. ...
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "3.12"
  - type: input
    id: endstone-version
    attributes:
      label: Endstone Version
      placeholder: "0.11.2"
